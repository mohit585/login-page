<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>login page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="toggle-buttons">
      <button onclick="showLogin">LOGIN</button>
      <button onclick="showSignup">SIGN UP</button>
    </div>
    <form id="login form" class="form">
      <h2>login</h2>

        <input type="text" id="signupName" placeholder="Enter Name" required>
    <input type="email" id="signemail" placeholder="Enter email" required>
    <input type="password" id="signpassword" placeholder ="Enter password" required> 
    <button type="submit">sign up</button>
  <p id="sign up message"></p>
  </form>

  </div>
   <script src="script.js"></script>

</body>
</html>
